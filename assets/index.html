<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sheet Classification</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div>
        <div class="header">
            <h1 class="arduino-text">EcoRover Q</h1>
            <img class="team-logo" src="img/logo_team.png" width="150" height="150" alt="Logo Team">
            <img class="arduino-logo" src="img/QA.svg" alt="Logo Arduino Qualcomm">
        </div>

        <div class="main-content">
            <div class="container" id="video-container">
                <div id="videoFeedContainer">
                    <div id="videoPlaceholder" class="camera-status">
                        <img src="./img/no-face.svg" alt="Searching webcam">
                        <p class="feedback-text">Searching Webcam...</p>
                    </div>
                    <iframe id="dynamicIframe" title="Video stream" width="1024px" height="768px" frameBorder="0" style="display: none;"></iframe>
                </div>             
            </div>

            <div class="right-column">
                <div class="container container-right">
                    <div id="feedback-section" class="feedback-section">
                        <div style="display: flex; align-items: center; gap: 8px; position: relative;">
                        <h2 class="recent-scans-title" style="margin: 0;">Feedback</h2>
                        <img src="./img/info.svg" alt="Info" class="info-btn feedback"/>
                        <div class="popover"></div>
                    </div>
                        <div id="feedback-content" class="feedback-content">
                            <img src="img/stars.svg" alt="Stars">
                            <p class="feedback-text">System response will appear here</p>
                        </div>
                    </div>
                </div>
              <div class="container container-right">
                  <h2 class="recent-scans-title" style="margin-bottom: 16px;">Clima del Entorno</h2>
                    
                  <div style="display: flex; flex-direction: column; gap: 12px; font-family: 'Open Sans', sans-serif; color: #2C353A;">
                      <div style="display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid #DAE3E3;">
                          <div style="display: flex; align-items: center; gap: 8px;">
                              <span style="font-size: 20px;">🌡️</span>
                              <strong>Temperatura:</strong>
                          </div>
                          <span id="tempValue" style="font-size: 16px; font-weight: bold; color: #008184;">-- °C</span>
                      </div>
                        
                      <div style="display: flex; align-items: center; justify-content: space-between;">
                          <div style="display: flex; align-items: center; gap: 8px;">
                              <span style="font-size: 20px;">💧</span>
                              <strong>Humedad:</strong>
                          </div>
                          <span id="humValue" style="font-size: 16px; font-weight: bold; color: #008184;">-- %</span>
                      </div>
                    </div>
                </div>

                <div class="container container-right">
                    <h2 class="recent-scans-title" style="margin-bottom: 8px;">Control de Movimiento - EcoRover Q</h2>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <p style="font-family: 'Open Sans', sans-serif; font-size: 12px; color: #5D6A6B; margin: 0 0 8px 0; text-align: center;">
                            Ejecuta o detén la secuencia de exploración.
                        </p>
                        
                        <button id="motorControlBtn" style="width: 100%; background-color: #008184; color: white; border: none; border-radius: 8px; padding: 12px; font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                            ▶️ Iniciar Rutina
                        </button>
                    </div>
                </div>

                <div class="container container-right">
                    <div class="recent-detections-section">
                        <div class="recent-scans-title-container">
                            <h2 class="recent-scans-title">Recent detections</h2>
                        </div>
                        <ul id="recentClassifications"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div id="error-container" class="error-message" style="display: none;"></div>
    </div>

    <script>
        const iframe = document.getElementById('dynamicIframe');
        const placeholder = document.getElementById('videoPlaceholder');
        const currentHostname = window.location.hostname;
        const targetPort = 4912;
        const targetPath = '/embed';
        const streamUrl = `http://${currentHostname}:${targetPort}${targetPath}`;

        let intervalId;

        iframe.onload = () => {
            if (intervalId) {
                clearInterval(intervalId);
            }
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
        };

        const startLoading = () => {
            // Set the src to start loading
            iframe.src = streamUrl;
        };

        intervalId = setInterval(startLoading, 1000); // Try to load every second
    </script>

    <script src="libs/socket.io.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
